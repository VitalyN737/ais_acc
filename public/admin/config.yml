backend:
  name: github
  repo: VitalyN737/ais_acc
  branch: main
  auth_type: token

site_url: https://24x365days.com
display_url: https://24x365days.com

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "home"
    label: "Home Page"
    files:
      - file: "src/content/home.json"
        label: "Home Page Content"
        name: "home"
        fields:
          - name: "hero"
            label: "Hero Section"
            widget: "object"
            fields:
              - { label: "Welcome Text", name: "welcomeText", widget: "string" }
              - { label: "First Name", name: "firstName", widget: "string" }
              - { label: "Last Name", name: "lastName", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Operatic Roles Count", name: "operaticRolesCount", widget: "string" }

  - name: "profile"
    label: "Profile"
    files:
      - file: "src/content/profile.json"
        label: "Profile Content"
        name: "profile"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - label: "Bio Paragraphs"
            name: "bio"
            widget: "list"
            field: { label: "Bio Paragraph", name: "paragraph", widget: "text" }
          - { label: "Experience Years", name: "experience", widget: "number" }
          - { label: "Performance Count", name: "performances", widget: "number" }
          - { label: "Profile Image", name: "image", widget: "image" }

  - name: "news"
    label: "News"
    folder: "src/content/news"
    create: true
    slug: "{{id}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "performances"
    label: "Performances"
    folder: "src/content/performances"
    create: true
    slug: "{{id}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Month", name: "month", widget: "string" }
      - { label: "Day", name: "day", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Active", name: "active", widget: "boolean" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    folder: "src/content/gallery"
    create: true
    slug: "{{id}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }

  - name: "media"
    label: "Media"
    folder: "src/content/media"
    create: true
    slug: "{{id}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Type", name: "type", widget: "select", options: ["video", "audio"] }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Duration", name: "duration", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "repertoire"
    label: "Repertoire"
    folder: "src/content/repertoire"
    create: true
    slug: "{{id}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Composer", name: "composer", widget: "string" }
      - { label: "Role/Work", name: "role", widget: "string" }
      - { label: "Opera", name: "opera", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "select", options: ["opera", "concert"] }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "cds"
    label: "CDs"
    folder: "src/content/cds"
    create: true
    slug: "{{id}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Featured", name: "featured", widget: "boolean" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Tracks"
        name: "tracks"
        widget: "list"
        field: { label: "Track Title", name: "track", widget: "string" }

  - name: "contact"
    label: "Contact"
    files:
      - file: "src/content/contact.json"
        label: "Contact Content"
        name: "contact"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - name: "management"
            label: "Management"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }

  - name: "footer"
    label: "Footer"
    files:
      - file: "src/content/footer.json"
        label: "Footer Content"
        name: "footer"
        fields:
          - { label: "Copyright Text", name: "copyright", widget: "string" }
          - label: "Footer Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
